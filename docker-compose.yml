services:
  
  backend:
    build: ./backend
    container_name: nutrical-backend
    ports:
      - "3000:3000"
      - "5555:5555" # eliminar este puerto al convertir a producción
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://nutrical_user:nutrical_password@db:5432/nutrical?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  db:
    image: postgres:15-alpine
    container_name: nutrical-db
    environment:
      POSTGRES_USER: nutrical_user
      POSTGRES_PASSWORD: nutrical_password
      POSTGRES_DB: nutrical
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrical_user -d nutrical"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: